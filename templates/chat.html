{% extends "base.html" %} {% block title %}WebOllama - Chat{% endblock %} {% block extra_css %} <style>
    .chat-container {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
    }

    .chat-input textarea {
        flex: 1;
        resize: none;
    }

    /* Assistant bubble — markdown content resets */
    .msg-assistant p {
        margin-bottom: 0.4rem;
    }

    .msg-assistant p:last-child {
        margin-bottom: 0;
    }

    .msg-assistant ul,
    .msg-assistant ol {
        padding-left: 1.25rem;
        margin-bottom: 0.4rem;
    }

    .msg-assistant li {
        margin-bottom: 0.2rem;
    }

    .msg-assistant code {
        background: var(--color-neutral-200);
        padding: 0.1em 0.35em;
        border-radius: var(--radius-sm, 4px);
        font-size: 0.85em;
    }

    .dark .msg-assistant code {
        background: var(--color-neutral-700);
    }

    .msg-assistant pre {
        background: var(--color-neutral-200);
        padding: 0.75rem;
        padding-bottom: 1.1rem;
        border-radius: var(--radius-lg, 0.5rem);
        overflow-x: auto;
        margin-bottom: 0.4rem;
        position: relative;
        scrollbar-width: thin;
        scrollbar-color: transparent transparent;
        transition: scrollbar-color 0.2s;
    }

    .msg-assistant pre:hover {
        scrollbar-color: var(--color-neutral-400) transparent;
    }

    .msg-assistant pre::-webkit-scrollbar {
        height: 4px;
    }

    .msg-assistant pre::-webkit-scrollbar-track {
        background: transparent;
    }

    .msg-assistant pre::-webkit-scrollbar-thumb {
        background: transparent;
        border-radius: 9999px;
    }

    .msg-assistant pre:hover::-webkit-scrollbar-thumb {
        background: var(--color-neutral-400);
    }

    .dark .msg-assistant pre {
        background: var(--color-neutral-900);
    }

    .dark .msg-assistant pre:hover {
        scrollbar-color: var(--color-neutral-600) transparent;
    }

    .dark .msg-assistant pre:hover::-webkit-scrollbar-thumb {
        background: var(--color-neutral-600);
    }

    .msg-assistant pre code {
        background: transparent;
        padding: 0 !important;
        font-size: inherit;
    }

    .copy-btn {
        position: absolute;
        top: 0.4rem;
        right: 0.4rem;
        background: var(--color-neutral-300);
        color: var(--color-neutral-700);
        border: none;
        border-radius: var(--radius-sm, 4px);
        padding: 0.15rem 0.4rem;
        font-size: 0.7rem;
        line-height: 1.4;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.15s, background 0.15s;
    }

    .msg-assistant pre:hover .copy-btn {
        opacity: 1;
    }

    .copy-btn:hover {
        background: var(--color-neutral-400);
    }

    .dark .copy-btn {
        background: var(--color-neutral-700);
        color: var(--color-neutral-300);
    }

    .dark .copy-btn:hover {
        background: var(--color-neutral-600);
    }

    .msg-assistant h1,
    .msg-assistant h2,
    .msg-assistant h3 {
        font-weight: 600;
        margin-bottom: 0.3rem;
    }

    .loader {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--color-neutral-200);
        border-radius: 50%;
        border-top-color: var(--color-neutral-700);
        animation: spin 1s ease-in-out infinite;
    }

    .dark .loader {
        border-color: var(--color-neutral-700);
        border-top-color: var(--color-neutral-300);
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .streaming-content {
        position: relative;
    }

    .cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background-color: var(--color-neutral-700);
        margin-left: 2px;
        vertical-align: middle;
        animation: blink 1s step-end infinite;
    }

    .dark .cursor {
        background-color: var(--color-neutral-300);
    }

    @keyframes blink {

        0%,
        100% {
            opacity: 1;
        }

        50% {
            opacity: 0;
        }
    }

    /* Let highlight.js colour the tokens; our pre provides the background */
    .msg-assistant pre code.hljs {
        background: transparent;
        padding: 0 !important;
        font-size: inherit;
    }

    /* Links inside assistant bubbles — colour inherits from bubble text */
    .msg-assistant a {
        color: inherit;
        text-decoration: none;
    }

    .msg-assistant a:hover {
        text-decoration: underline;
    }
</style>
<link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
{% endblock %} {% block content %} 
<div class="p-6 sm:p-8 w-full max-w-6xl self-center flex flex-1 flex-col min-h-0">
    <div class="mb-6 shrink-0">
        <h1 class="text-2xl sm:text-3xl text-neutral-900 tracking-tight dark:text-neutral-200 [overflow-wrap:anywhere] break-all font-semibold">Chat with Ollama</h1>
    </div>
    <div class="flex flex-col lg:flex-row gap-4 flex-1 min-h-0">
        <div class="w-full lg:w-64 shrink-0">
            <div class="rounded-2xl border border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 shadow-sm p-5">
                <h5 class="text-base font-semibold text-neutral-900 dark:text-white mb-4">Model Selection</h5>
                <div class="mb-4">
                    <label for="model-select" class="block text-sm font-medium text-neutral-700 dark:text-neutral-300 mb-1">Choose a model</label>
                    <select
                        class="w-full rounded-md border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-neutral-900 dark:text-neutral-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-neutral-400"
                        id="model-select">
                        <option value="" disabled selected>Select a model</option> {% for model in models %} <option value="{{ model.name }}" {% if request.args.get('model')==model.name %}selected{%
                            endif %}>{{ model.name }}</option> {% endfor %}
                    </select>
                </div>
                <button
                    class="w-full inline-flex items-center justify-center px-4 py-2 text-sm font-medium rounded-md bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors"
                    id="clear-chat">
                    <i class="fas fa-broom mr-2"></i> Clear Chat </button>
            </div>
        </div>
        <div class="flex-1 min-w-0 flex flex-col min-h-0">
            <div class="chat-container">
                <div class="flex flex-col flex-1 min-h-0 rounded-2xl p-4 mb-4 overflow-y-auto overflow-x-hidden bg-gray-50 dark:bg-white/5 border border-gray-950/10 dark:border-white/10" id="chat-messages">
                    <!-- Messages will be added here -->
                </div>
                <div class="h-28 rounded-2xl bg-gray-100 dark:bg-neutral-800 border border-gray-950/10 dark:border-white/10 relative">
                    <div class="flex chat-input">
                        <textarea id="message-input"
                            class="grow m-4 outline outline-0 focus:outline-0 active:border-transparent bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-100 min-h-16 disabled:opacity-50 disabled:cursor-not-allowed"
                            placeholder="{% if request.args.get('model') %}Type your message here ...{% else %}Select a model to start chatting...{% endif %}"
                            {% if not request.args.get('model') %}disabled{% endif %}></textarea>
                    </div>
                    <div class="flex gap-2 items-center absolute right-2 bottom-2">
                        <button id="send-button" class="bg-neutral-200 dark:bg-white hover:bg-neutral-300 dark:hover:bg-neutral-200 transition-colors rounded-full text-neutral-700 hover:text-neutral-600 w-8 h-8 p-2 disabled:opacity-40 disabled:cursor-not-allowed" {% if not request.args.get('model') %}disabled{% endif %}>
                            <!-- Send icon (arrow up) -->
                            <svg id="icon-send" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M112 244l144-144l144 144"></path>
                                <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="48" d="M256 120v292"></path>
                            </svg>
                            <!-- Stop icon (filled square) -->
                            <svg id="icon-stop" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" class="hidden">
                                <rect x="96" y="96" width="320" height="320" rx="16" fill="currentColor"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div> {% endblock %} {% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modelSelect = document.getElementById('model-select');
        const chatMessages = document.getElementById('chat-messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        function getTimestamp() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // highlight.js theme switcher
        const hljsTheme = document.getElementById('hljs-theme');
        function updateHljsTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            hljsTheme.href = isDark
                ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css'
                : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css';
        }
        updateHljsTheme();
        new MutationObserver(updateHljsTheme).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });

        function highlightCodeBlocks(containerEl) {
            containerEl.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            containerEl.querySelectorAll('pre').forEach(pre => {
                if (pre.querySelector('.copy-btn')) return;
                const btn = document.createElement('button');
                btn.className = 'copy-btn';
                btn.title = 'Copy code';
                btn.innerHTML = '<i class="fas fa-copy"></i>&nbsp;Copy';
                btn.addEventListener('click', () => {
                    const code = pre.querySelector('code');
                    navigator.clipboard.writeText(code.innerText).then(() => {
                        btn.innerHTML = '<i class="fas fa-check"></i>&nbsp;Copied';
                        setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i>&nbsp;Copy'; }, 2000);
                    });
                });
                pre.appendChild(btn);
            });
        }

        const clearChatButton = document.getElementById('clear-chat');

        let conversation = [];
        let isProcessing = false;
        let abortController = null;

        const iconSend = document.getElementById('icon-send');
        const iconStop = document.getElementById('icon-stop');

        function setStopMode() {
            iconSend.classList.add('hidden');
            iconStop.classList.remove('hidden');
            sendButton.classList.replace('bg-neutral-700', 'bg-red-600');
            sendButton.classList.replace('hover:bg-neutral-600', 'hover:bg-red-500');
        }

        function setSendMode() {
            iconStop.classList.add('hidden');
            iconSend.classList.remove('hidden');
            sendButton.classList.replace('bg-red-600', 'bg-neutral-700');
            sendButton.classList.replace('hover:bg-red-500', 'hover:bg-neutral-600');
        }

        // Enable input when model is selected
        modelSelect.addEventListener('change', function () {
            const isModelSelected = !!this.value;
            messageInput.disabled = !isModelSelected;
            sendButton.disabled = !isModelSelected;
            messageInput.placeholder = isModelSelected
                ? 'Type your message here ...'
                : 'Select a model to start chatting...';

            if (isModelSelected) {
                messageInput.focus();
            }

            // Clear chat when changing models
            chatMessages.innerHTML = '';
            conversation = [];
        });

        // Initialize if model is preselected from URL — handled server-side via Jinja2

        // Send message or stop generation when clicking button
        sendButton.addEventListener('click', function () {
            if (isProcessing) {
                if (abortController) abortController.abort();
            } else {
                sendMessage();
            }
        });

        // Send message when pressing Enter (but not with Shift+Enter)
        messageInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Clear chat
        clearChatButton.addEventListener('click', function () {
            chatMessages.innerHTML = '';
            conversation = [];
        });

        function sendMessage() {
            if (isProcessing) return;

            const message = messageInput.value.trim();
            const model = modelSelect.value;

            if (!message || !model) return;

            // Add user message to UI
            addMessage('user', message);

            // Clear input
            messageInput.value = '';

            isProcessing = true;
            messageInput.disabled = true;
            abortController = new AbortController();
            setStopMode();

            // Reference to the message element for streaming
            let assistantMessageEl = null;
            let assistantMessageContent = '';

            // Create and add the assistant message container
            assistantMessageEl = document.createElement('div');
            const assistantTimestamp = getTimestamp();
            assistantMessageEl.className = 'flex justify-start mb-3';
            assistantMessageEl.innerHTML = `
                <div class="msg-assistant max-w-[70%] rounded-2xl px-4 py-2 bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-200 text-sm">
                    <div class="streaming-content"><div class="cursor"></div></div>
                    <span class="text-xs opacity-70 mt-1 block">${assistantTimestamp}</span>
                </div>
            `;
            chatMessages.appendChild(assistantMessageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Get streaming content container
            const streamingContentEl = assistantMessageEl.querySelector('.streaming-content');

            // Use fetch to send the data and handle the stream response
            fetch('/api/chat', {
                method: 'POST',
                signal: abortController.signal,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').getAttribute('content')
                },
                body: JSON.stringify({
                    model: model,
                    message: message,
                    conversation: conversation,
                    stream: true
                })
            })
                .then(response => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();

                    function processStream() {
                        return reader.read().then(({ done, value }) => {
                            if (done) {
                                return;
                            }

                            const chunk = decoder.decode(value, { stream: true });
                            const lines = chunk.split('\n\n');

                            for (let line of lines) {
                                if (line.startsWith('data: ')) {
                                    try {
                                        const data = JSON.parse(line.substring(6));

                                        if (data.error) {
                                            if (assistantMessageEl && assistantMessageEl.parentNode) {
                                                chatMessages.removeChild(assistantMessageEl);
                                            }
                                            addErrorMessage(data.error);
                                            resetUI();
                                            return;
                                        }

                                        if (data.delta) {
                                            assistantMessageContent += data.delta;
                                            streamingContentEl.innerHTML = marked.parse(assistantMessageContent) + '<div class="cursor"></div>';
                                            chatMessages.scrollTop = chatMessages.scrollHeight;
                                        }

                                        if (data.done) {
                                            assistantMessageEl.innerHTML = `
                                            <div class="msg-assistant max-w-[70%] rounded-2xl px-4 py-2 bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-200 text-sm">
                                                ${marked.parse(assistantMessageContent)}
                                                <span class="text-xs opacity-70 mt-1 block">${assistantTimestamp}</span>
                                            </div>
                                        `;
                                            highlightCodeBlocks(assistantMessageEl);
                                            linkifyUrls(assistantMessageEl);

                                            conversation = data.conversation;
                                            resetUI();
                                            return;
                                        }
                                    } catch (e) {
                                        // Invalid JSON, ignore this line
                                    }
                                }
                            }

                            return processStream();
                        });
                    }

                    return processStream();
                })
                .catch(error => {
                    if (error.name === 'AbortError') {
                        // User stopped generation — keep whatever was streamed so far
                        if (assistantMessageEl) {
                            assistantMessageEl.innerHTML = `
                            <div class="msg-assistant max-w-[70%] rounded-2xl px-4 py-2 bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-200 text-sm">
                                ${assistantMessageContent ? marked.parse(assistantMessageContent) : '<em class="opacity-50">Stopped.</em>'}
                                <span class="text-xs opacity-70 mt-1 block">${assistantTimestamp}</span>
                            </div>
                        `;
                            highlightCodeBlocks(assistantMessageEl);
                            linkifyUrls(assistantMessageEl);
                        }
                    } else {
                        if (assistantMessageEl && assistantMessageEl.parentNode) {
                            chatMessages.removeChild(assistantMessageEl);
                        }
                        addErrorMessage('Error with streaming response: ' + error.message);
                    }
                    resetUI();
                });

            function resetUI() {
                isProcessing = false;
                abortController = null;
                messageInput.disabled = false;
                setSendMode();
                messageInput.focus();
            }
        }

        function addMessage(role, content) {
            const wrapper = document.createElement('div');

            const ts = getTimestamp();
            if (role === 'user') {
                wrapper.className = 'flex justify-end mb-3';
                wrapper.innerHTML = `
                    <div class="max-w-[70%] rounded-2xl px-4 py-2 bg-neutral-800 dark:bg-neutral-200 text-neutral-50 dark:text-neutral-900 text-sm">
                        <p class="whitespace-pre-wrap break-words">${escapeHtml(content)}</p>
                        <span class="text-xs opacity-70 mt-1 block">${ts}</span>
                    </div>
                `;
                linkifyUrls(wrapper);
            } else {
                wrapper.className = 'flex justify-start mb-3';
                wrapper.innerHTML = `
                    <div class="msg-assistant max-w-[70%] rounded-2xl px-4 py-2 bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-neutral-200 text-sm">
                        ${marked.parse(content)}
                        <span class="text-xs opacity-70 mt-1 block">${ts}</span>
                    </div>
                `;
                highlightCodeBlocks(wrapper);
                linkifyUrls(wrapper);
            }

            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addErrorMessage(error) {
            const messageEl = document.createElement('div');
            messageEl.className = 'flex items-start gap-2 px-4 py-3 rounded-md border text-sm bg-red-50 dark:bg-red-950/30 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300 mt-3';
            messageEl.innerHTML = `<i class="fas fa-exclamation-circle mt-0.5 shrink-0"></i><span>${error}</span>`;
            chatMessages.appendChild(messageEl);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
    });
</script> {% endblock %}
